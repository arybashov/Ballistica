<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ballistica / Tactica</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #0b0e10; color: #c8cdd0; font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; margin: 0; overflow: hidden; }
        #sceneCanvas { display: block; width: 100vw; height: 100vh; }
        .topbar { position: fixed; top: 0; left: 0; right: 0; z-index: 10; display: flex; align-items: center; justify-content: space-between; padding: 10px 18px; background: linear-gradient(180deg,rgba(11,14,16,0.95) 0%,rgba(11,14,16,0.7) 80%,transparent); pointer-events: auto; }
        .topbar h1 { font-size: 18px; font-weight: 700; color: #f0b24f; margin: 0; }
        .panel { position: fixed; top: 108px; left: 14px; z-index: 10; background: rgba(17,22,27,0.92); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 10px; width: 240px; }
        .env-panel { position: fixed; top: 108px; left: 270px; z-index: 10; background: rgba(17,22,27,0.92); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 10px; width: 180px; }
        .env-panel h2 { font-size: 12px; font-weight: 600; color: #96a8b6; margin: 0 0 6px; }
        .env-panel label { font-size: 10px; color: #889; display: flex; flex-direction: column; gap: 1px; margin-bottom: 3px; }
        .env-panel input { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.10); border-radius: 3px; color: #ccc; padding: 2px 4px; font: 500 10px/1.3 inherit; }
        .env-panel button { display: block; width: 100%; margin-top: 4px; padding: 3px 8px; border: 1px solid rgba(255,255,255,0.10); border-radius: 4px; background: rgba(255,255,255,0.04); color: #aab; cursor: pointer; font: 500 10px/1.3 inherit; }
        .env-panel button:hover { border-color: rgba(240,178,79,0.4); color: #f0b24f; }
        .panel h2 { font-size: 12px; font-weight: 600; color: #96a8b6; margin: 0 0 8px; }
        .panel button { display: block; width: 100%; margin-bottom: 4px; padding: 6px 10px; border: 1px solid rgba(255,255,255,0.10); border-radius: 5px; background: rgba(255,255,255,0.04); color: #aab; cursor: pointer; font: 500 11px/1.3 inherit; transition: all 0.15s; text-align: left; }
        .panel button:hover { border-color: rgba(240,178,79,0.4); color: #f0b24f; }
        .panel button.active { background: rgba(240,178,79,0.15); border-color: #f0b24f; color: #f0b24f; }

        .control-grid label { font-size: 10px; color: #889; }
        .control-grid input { width: 100%; box-sizing: border-box; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.10); border-radius: 3px; color: #ccc; padding: 2px 4px; font: 500 10px/1.3 inherit; margin-top: 3px; }
        .button-row { display: flex; gap: 4px; margin-top: 6px; }
        .button-row .primary { background: rgba(240,178,79,0.15); border-color: #f0b24f; color: #f0b24f; }
        .button-row button { padding: 4px 10px; border: 1px solid rgba(255,255,255,0.10); border-radius: 5px; background: rgba(255,255,255,0.04); color: #aab; cursor: pointer; font: 500 11px/1.3 inherit; }
        .button-row button:hover { border-color: rgba(240,178,79,0.4); color: #f0b24f; }
        .segmented { display: flex; gap: 2px; margin-top: 9px; }
        .segmented button { padding: 3px 8px; border: 1px solid rgba(255,255,255,0.10); border-radius: 4px; background: rgba(255,255,255,0.04); color: #889; cursor: pointer; font: 500 10px/1.3 inherit; }
        .segmented button.active { background: rgba(240,178,79,0.15); border-color: #f0b24f; color: #f0b24f; }
        .segmented button:hover { border-color: rgba(255,255,255,0.22); color: #ccc; }
        .launch-bar { position: fixed; top: 52px; left: 0; right: 0; z-index: 10; display: flex; align-items: center; gap: 8px; padding: 6px 14px; background: rgba(11,14,16,0.92); border-bottom: 1px solid rgba(255,255,255,0.06); flex-wrap: nowrap; overflow-x: auto; }
        .launch-bar label { font-size: 10px; color: #889; display: flex; flex-direction: column; gap: 1px; }
        .launch-bar input, .launch-bar select { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.10); border-radius: 3px; color: #ccc; padding: 2px 4px; font: 500 10px/1.3 inherit; }
        .launch-bar select { width: 194px; }
        .launch-bar input { width: 58px; height: 20px; box-sizing: border-box; }
        .hud-item { font-size: 15px; color: var(--text,#c8cdd0); font-weight: 400; white-space: nowrap; background: rgba(10,12,15,0.65); padding: 0 8px; border-radius: 999px; border: 1px solid var(--line,rgba(255,255,255,0.1)); width: 188px; height: 20px; display: inline-flex; align-items: center; align-self: flex-end; text-shadow: none; }
        .launch-bar button { padding: 3px 10px; border: 1px solid rgba(255,255,255,0.10); border-radius: 5px; background: rgba(255,255,255,0.04); color: #aab; cursor: pointer; font: 500 10px/1.3 inherit; white-space: nowrap; }
        .launch-bar button.primary { background: rgba(240,178,79,0.15); border-color: #f0b24f; color: #f0b24f; }
        .launch-bar button:hover { border-color: rgba(240,178,79,0.4); color: #f0b24f; }

        .orient-panel h2 { font-size: 12px; font-weight: 600; color: #96a8b6; margin: 0 0 6px; }
        .orient-panel button { padding: 4px 14px; border: 1px solid rgba(255,255,255,0.12); border-radius: 999px; background: rgba(10,12,15,0.65); color: #c8cdd0; cursor: pointer; font: 600 11px/1.3 inherit; }

        .orient-panel button.primary { background: rgba(78,203,113,0.2); border-color: #4ecb71; color: #4ecb71; font-weight: 700; padding: 6px 22px; font-size: 13px; text-shadow: 0 0 10px rgba(78,203,113,0.5); }

</head>
<body>

            <canvas id="windCompassCanvas" width="80" height="80" style="display:block;border-radius:50%"></canvas>

    <div class="panel" id="draggablePanel">

        <button id="btnApplyScale" style="margin-left:4px;padding:2px 8px;font-size:10px" title="Применить масштаб (1 единица OBJ = N × 5000 метров)">OK</button>

    <div class="panel mass-panel" style="top:340px">
        <h2>Масса / Cd</h2>
        <div class="control-grid">
            <label>Масса (кг)<input id="mass" type="number" value="43.5" min="0.1" max="2000" step="0.1"></label>
            <label>Форм-фактор<input id="formFactor" type="number" value="0.92" min="0" max="3" step="0.05"></label>

    <div class="legend" style="display:none"></div>

    <div class="height-label" id="heightLabel" style="display:none">0 м</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
        }
    }
    </script>
    <script src="physics.js"></script>
    <script src="terrain.js"></script>
    <script type="module">
        import * as THREE from 'three';
        import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        (function () {
            const canvas = document.getElementById('sceneCanvas');
            const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
            renderer.setClearColor(0x1a1d22, 1);
            renderer.outputEncoding = THREE.sRGBEncoding;

            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(48, 1, 0.5, 200000);
            camera.position.set(-12000, 9000, -12000);
            camera.lookAt(0, 0, 0);

            const controls = new OrbitControls(camera, renderer.domElement);
            controls.target.set(0, 0, 0);
            controls.enableDamping = false;
            controls.enablePan = true;
            controls.enableZoom = true;
            controls.screenSpacePanning = false;
            controls.mouseButtons = {
                LEFT: null,
                MIDDLE: THREE.MOUSE.PAN,
                RIGHT: THREE.MOUSE.ROTATE
            };
            controls.update();

            const ambient = new THREE.AmbientLight(0x202030, 0.15);
            const hemi = new THREE.HemisphereLight(0xc8c0e0, 0x101820, 0.3);
            const sun = new THREE.DirectionalLight(0xffc080, 3.0);
            sun.position.set(-550, 180, -150);
            scene.add(ambient, hemi, sun);

            let coordinateGrid = null;
            let originMarker = null;

            function setCoordinateGrid(box) {
                if (coordinateGrid) {
                    scene.remove(coordinateGrid);
                    coordinateGrid.geometry.dispose();
                    if (Array.isArray(coordinateGrid.material)) {
                        coordinateGrid.material.forEach(function(material) { material.dispose(); });
                    } else {
                        coordinateGrid.material.dispose();
                    }
                }

                const sizeX = box ? box.max.x - box.min.x : 35000;
                const sizeZ = box ? box.max.z - box.min.z : 35000;
                const gridSize = Math.max(1000, Math.ceil(Math.max(sizeX, sizeZ) / 1000) * 1000);
                const divisions = Math.max(20, Math.min(140, Math.round(gridSize / 500)));
                coordinateGrid = new THREE.GridHelper(gridSize, divisions, 0x4cc9a4, 0x31414a);
                coordinateGrid.position.set(
                    box ? (box.min.x + box.max.x) * 0.5 : 0,
                    box ? box.min.y - 2 : 0,
                    box ? (box.min.z + box.max.z) * 0.5 : 0
                );
                coordinateGrid.renderOrder = -10;
                scene.add(coordinateGrid);
            }

            setCoordinateGrid(null);

            let terrainMesh = null;
            const raycaster = new THREE.Raycaster();
            raycaster.far = 5000;

            // ── Симуляция баллистики ──────────────────────────────────────────
            let heightGrid = null;       // { data, size, worldSize, half, scale }
            let trajectoryLine = null;
            let previewLine = null;
            let trajectoryHistory = [];
            let targetMarker = null;
            let projectileDot = null;
            let gunMarker = null;
            let gunRing = null;
            let impactLabel = null;
            let shotCounter = 0;
            let targetModels = [];
            let selectedTarget = null;
            let targetWorld = null;
            let shot = null;
            let shotRunning = false;
            let shotPaused = false;
            let shotTime = 0;
            let solvingTarget = false;
            const DT_SIM = 0.02;
            let terrainScale = 1.0;
            const gunOffset = { x: 0, z: 0 };

            function buildHeightGrid(mesh) {
                const gridSize = 512;
                mesh.updateMatrixWorld();
                const box = new THREE.Box3().setFromObject(mesh);
                const worldSize = Math.max(box.max.x - box.min.x, box.max.z - box.min.z);
                if (worldSize < 1) { console.warn('Height grid: terrain too small', worldSize); return; }
                const data = new Float32Array(gridSize * gridSize).fill(-9999);

                mesh.traverse(function(child) {
                    if (!child.isMesh || !child.geometry.attributes.position) return;
                    const pos = child.geometry.attributes.position;
                    const wp = new THREE.Vector3();
                    child.updateWorldMatrix(true, false);
                    for (let i = 0; i < pos.count; i++) {
                        wp.fromBufferAttribute(pos, i).applyMatrix4(child.matrixWorld);
                        const gx = Math.round((wp.x - box.min.x) / worldSize * (gridSize - 1));
                        const gy = Math.round((wp.z - box.min.z) / worldSize * (gridSize - 1));
                        if (gx >= 0 && gx < gridSize && gy >= 0 && gy < gridSize) {
                            const idx = gy * gridSize + gx;
                            if (wp.y > data[idx]) data[idx] = wp.y;
                        }
                    }
                });
                // Fill holes
                for (let y = 1; y < gridSize - 1; y++) {
                    for (let x = 1; x < gridSize - 1; x++) {
                        const idx = y * gridSize + x;
                        if (data[idx] === -9999) {
                            let sum = 0, cnt = 0;
                            for (let dy = -1; dy <= 1; dy++)
                                for (let dx = -1; dx <= 1; dx++) {
                                    const v = data[(y+dy)*gridSize + (x+dx)];
                                    if (v !== -9999) { sum += v; cnt++; }
                                }
                            if (cnt > 0) data[idx] = sum / cnt;
                        }
                    }
                }
                heightGrid = { data, size: gridSize, worldSize, minX: box.min.x, minZ: box.min.z };
                console.log('Height grid:', gridSize + 'x' + gridSize, 'world', worldSize.toFixed(0) + 'm',
                    'range', box.min.x.toFixed(0) + '-' + box.max.x.toFixed(0),
                    box.min.z.toFixed(0) + '-' + box.max.z.toFixed(0));
            }

            function getTerrainH(wx, wz) {
                if (!heightGrid) return 0;
                const worldSize = heightGrid.worldSize;
                const size = heightGrid.size;
                const fx = Math.max(0, Math.min(size - 1, (wx - heightGrid.minX) / worldSize * (size - 1)));
                const fy = Math.max(0, Math.min(size - 1, (wz - heightGrid.minZ) / worldSize * (size - 1)));
                const x0 = Math.max(0, Math.min(size - 2, Math.floor(fx)));
                const y0 = Math.max(0, Math.min(size - 2, Math.floor(fy)));
                const tx = fx - x0, ty = fy - y0;
                const a = heightGrid.data[y0 * size + x0];
                const b = heightGrid.data[y0 * size + x0 + 1];
                const c = heightGrid.data[(y0 + 1) * size + x0];
                const d = heightGrid.data[(y0 + 1) * size + x0 + 1];
                const vals = [a, b, c, d].filter(function(v) { return v !== -9999; });
                if (vals.length === 0) return 0;
                return vals.reduce(function(s, v) { return s + v; }, 0) / vals.length;
            }

            function shotToWorldPoint(p) {
                return new THREE.Vector3(p.x + gunOffset.x, p.y + 8, p.z + gunOffset.z);
            }

            function terrainHeightForShot(localX, localZ) {
                return getTerrainH(gunOffset.x + localX, gunOffset.z + localZ);
            }

            function bearingDegToWorldPoint(wx, wz) {
                const dx = wx - gunOffset.x;
                const dz = wz - gunOffset.z;
                return (Math.atan2(dz, dx) * 180 / Math.PI + 360) % 360;
            }

            function gunGroundHeight() {
                return getTerrainH(gunOffset.x, gunOffset.z);
            }

            function syncGunToTerrain() {
                const h = gunGroundHeight();
                if (gunMarker) gunMarker.position.set(gunOffset.x, h, gunOffset.z);
                if (gunRing) gunRing.position.set(gunOffset.x, h, gunOffset.z);
                document.getElementById('h0').value = Math.round(h);
                return h;
            }

            function setTargetWorld(wx, wz) {
                const h = getTerrainH(wx, wz);
                targetWorld = { x: wx, y: h, z: wz };
                return targetWorld;
            }

            // Physics works in shot-local X/Z. Terrain is stored in world X/Z.

            function findAngleForTarget() {
                if (solvingTarget) return;
                solvingTarget = true;
                const targetRange = Number(document.getElementById('targetRange').value) || 15000;
                const v0 = Number(document.getElementById('v0').value) || 655;
                const h0 = syncGunToTerrain();
                if (targetWorld) {
                    const targetAzimuth = bearingDegToWorldPoint(targetWorld.x, targetWorld.z);
                    const targetLocalX = targetWorld.x - gunOffset.x;
                    const targetLocalZ = targetWorld.z - gunOffset.z;
                    setAzimuth(targetAzimuth);
                    let bestTerrainAngle = 45, bestTerrainDiff = Infinity;
                    for (let a = 5; a <= 85; a += 0.5) {
                        const p = { ...params, angle: a, h0, v0, azimuth: targetAzimuth };
                        const s = new Projectile(v0, a, h0, targetAzimuth, p);
                        s.run(p.maxTime || 300, p.dt || 0.02);
                        const hit = s.trail[s.trail.length - 1] || { x: 0, z: 0 };
                        const diff = Math.hypot(hit.x - targetLocalX, hit.z - targetLocalZ);
                        if (diff < bestTerrainDiff) { bestTerrainDiff = diff; bestTerrainAngle = a; }
                    }
                    document.getElementById('angle').value = Math.round(bestTerrainAngle * 10) / 10;
                    rebuildPreview();
                    solvingTarget = false;
                    return;
                }
                let bestAngle = 45, bestDiff = Infinity;
                for (let a = 5; a <= 85; a += 0.5) {
                    const p = { ...params, angle: a, h0, v0 };
                    const s = new Projectile(v0, a, h0, params.azimuth || 0, p);
                    s.run(p.maxTime || 300, p.dt || 0.02);
                    const diff = Math.abs(s.getHorizontalRange() - targetRange);
                    if (diff < bestDiff) { bestDiff = diff; bestAngle = a; }
                }
                document.getElementById('angle').value = Math.round(bestAngle * 10) / 10;
                rebuildPreview();
                solvingTarget = false;
            }

            function setTargetToPrediction() {

            }

            function updateShot(dt) {
                if (!shotRunning || !shot || shot.landed || shotPaused) return;
                const steps = Math.ceil(dt / DT_SIM);
                for (let i = 0; i < steps && !shot.landed; i++) {
                    shot.step(DT_SIM);
                    shotTime += DT_SIM;
                }
                // Update trajectory line
                if (shot.trail.length >= 2 && trajectoryLine) {
                    const pts = shot.trail.map(shotToWorldPoint);
                    trajectoryLine.geometry.dispose();
                    trajectoryLine.geometry = new THREE.BufferGeometry().setFromPoints(pts);
                }
                // Update projectile dot
                if (projectileDot && shot.trail.length > 0) {
                    const p = shot.trail[shot.trail.length - 1];
                    projectileDot.position.copy(shotToWorldPoint(p));
                    projectileDot.visible = true;
                    if (shot.vx !== undefined) {
                        const dir = new THREE.Vector3(shot.vx, shot.vy, shot.vz).normalize();
                        projectileDot.quaternion.setFromUnitVectors(new THREE.Vector3(1, 0, 0), dir);
                    }
                }
                // Impact marker
                if (shot.landed) {
                    const p = shot.trail[shot.trail.length - 1];
                    // Impact label flag
                    const canvas = document.createElement('canvas');
                    canvas.width = 256; canvas.height = 64;
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = 'rgba(17,22,27,0.85)'; ctx.fillRect(0, 0, 256, 64);
                    ctx.strokeStyle = '#f0b24f'; ctx.lineWidth = 2; ctx.strokeRect(1, 1, 254, 62);
                    ctx.fillStyle = '#f0b24f'; ctx.font = 'bold 16px monospace';
                    ctx.fillText('Траектория #' + shotCounter, 10, 22);
                    ctx.fillStyle = '#ccc'; ctx.font = '14px monospace';
                    ctx.fillText('Дальность: ' + Math.round(shot.getHorizontalRange()) + ' м', 10, 42);
                    ctx.fillText('Время: ' + shot.t.toFixed(1) + ' с', 10, 58);
                    const tex = new THREE.CanvasTexture(canvas);
                    const spriteMat = new THREE.SpriteMaterial({ map: tex, transparent: true });
                    impactLabel = new THREE.Sprite(spriteMat);
                    impactLabel.scale.set(3000, 750, 1);
                    impactLabel.position.copy(shotToWorldPoint({ x: p.x, y: p.y + 60, z: p.z }));
                    scene.add(impactLabel);
                    shotRunning = false;
                    document.getElementById('runState').textContent = 'Попадание';
                    document.getElementById('launchBtn').classList.remove('running');
                document.getElementById('launchBtn').textContent = 'Старт';
                    setTimeout(rebuildPreview, 500);
                }
                // HUD
                if (shot) {
                    document.getElementById('hudRange').textContent = 'Дальность ' + Math.round(shot.getHorizontalRange()) + ' м';
                    document.getElementById('hudAltitude').textContent = 'Высота ' + Math.round(Math.max(0, shot.y)) + ' м';
                    document.getElementById('hudSpeed').textContent = 'Скорость ' + Math.round(shot.getSpeed()) + ' м/с';
                    document.getElementById('hudTime').textContent = 'Время ' + shot.t.toFixed(1) + ' с';
                }
            }

            const orbit = { yaw: -2.36, pitch: 0.6, distance: 20000, target: new THREE.Vector3(0, 500, 0), minDist: 100, maxDist: 150000 };

            function terrainOrbitTarget(box) {
                if (!box) return new THREE.Vector3(0, 500, 0);
                return new THREE.Vector3(0, (box.min.y + box.max.y) * 0.5, 0);
            }

            function updateCamera() {
                const sp = orbit.distance * Math.cos(orbit.pitch);
                camera.position.set(
                    orbit.target.x + sp * Math.sin(orbit.yaw),
                    orbit.target.y + orbit.distance * Math.sin(orbit.pitch),
                    orbit.target.z + sp * Math.cos(orbit.yaw)
                );
                controls.target.copy(orbit.target);
                controls.minDistance = orbit.minDist;
                controls.maxDistance = orbit.maxDist;
                controls.update();
            }

            function syncOrbitFromCamera() {
                orbit.target.copy(controls.target);
                const offset = new THREE.Vector3().subVectors(camera.position, controls.target);
                const distance = Math.max(orbit.minDist, Math.min(orbit.maxDist, offset.length()));
                orbit.distance = distance;
                if (distance > 0.001) {
                    orbit.pitch = Math.max(-0.1, Math.min(1.15, Math.asin(offset.y / distance)));
                    orbit.yaw = Math.atan2(offset.x, offset.z);
                }
            }

            function reanchorOrbitToScreenCenter() {
                const centerRaycaster = new THREE.Raycaster();
                centerRaycaster.far = 500000;
                centerRaycaster.setFromCamera(new THREE.Vector2(0, 0), camera);

                if (terrainMesh) {
                    const hits = centerRaycaster.intersectObject(terrainMesh, true);
                    if (hits.length > 0) {
                        orbit.target.copy(hits[0].point);
                        syncOrbitFromCamera();
                        return;
                    }
                }

                const planeY = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
                const point = new THREE.Vector3();
                if (centerRaycaster.ray.intersectPlane(planeY, point)) {
                    orbit.target.copy(point);
                    syncOrbitFromCamera();
                }
            }

            function loadOBJTerrain(path) {
                console.log('OBJ: loading', path);
                document.getElementById('fileName').textContent = 'Загрузка OBJ...';
                const loader = new OBJLoader();
                loader.load(path, function(object) {
                    console.log('OBJ: loaded');
                    if (terrainMesh) { scene.remove(terrainMesh); }
                    if (originMarker) { scene.remove(originMarker); originMarker = null; }
                    terrainMesh = object;
                    const mat = new THREE.MeshStandardMaterial({
                        color: 0x888888,
                        roughness: 0.9,
                        metalness: 0.05,
                    });
                    object.traverse(function(child) {
                        if (child.isMesh) {
                            child.material = mat;
                            child.receiveShadow = true;
                        }
                    });
                    scene.add(terrainMesh);
                    document.getElementById('fileName').textContent = path;
                    // Scale terrain, keep horizontal center at world origin and ground base at Y=0.
                    const rawBox = new THREE.Box3().setFromObject(terrainMesh);
                    const rawSize = Math.max(rawBox.max.x - rawBox.min.x, rawBox.max.z - rawBox.min.z);
                    const s = 35000 / rawSize;
                    terrainMesh.scale.set(s, s, s);
                    terrainMesh.updateMatrixWorld();
                    const box2 = new THREE.Box3().setFromObject(terrainMesh);
                    const center2 = box2.getCenter(new THREE.Vector3());
                    terrainMesh.position.set(
                        terrainMesh.position.x - center2.x,
                        terrainMesh.position.y - box2.min.y,
                        terrainMesh.position.z - center2.z
                    );
                    terrainMesh.updateMatrixWorld();
                    console.log('Terrain scaled to 35000m, center at origin');
                    buildHeightGrid(terrainMesh);
                    createTrajectoryLine();
                    const box3 = new THREE.Box3().setFromObject(terrainMesh);
                    const size = box3.getSize(new THREE.Vector3());
                    setCoordinateGrid(box3);
                    console.log('OBJ: ready, size', size.x.toFixed(0), 'x', size.z.toFixed(0));
                    orbit.target.copy(terrainOrbitTarget(box3));
                    orbit.distance = Math.max(size.x, size.z) * 0.7;
                    orbit.yaw = -2.36; // угол (0,0) в правом нижнем углу экрана
                    orbit.pitch = 0.6;
                    orbit.minDist = orbit.distance * 0.3;
                    orbit.maxDist = orbit.distance * 4;
                    updateCamera();
                    syncGunToTerrain();
                    rebuildPreview();
                }, undefined, function(err) {
                    console.error('OBJ: load error', err);
                    document.getElementById('fileName').textContent = 'Ошибка';
                });
            }

                    imgData.data[i * 4 + 2] = v;
                    imgData.data[i * 4 + 3] = 255;

                ctx.putImageData(imgData, 0, 0);
                return c;
            }

                const worldSize = Math.max(box3.max.x - box3.min.x, box3.max.z - box3.min.z);

            // ── Compass ────────────────────────────────────────────────────
            function drawCompass(deg) {
                const c = document.getElementById('compassCanvas');
                const ctx = c.getContext('2d');
                const cx = 40, cy = 40, r = 34;
                ctx.clearRect(0, 0, 80, 80);
                ctx.fillStyle = 'rgba(17,22,27,0.9)';
                ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 2; ctx.stroke();
                for (let a = 0; a < 360; a += 15) {
                    const rad = a * Math.PI / 180;
                    const inner = a % 90 === 0 ? r - 10 : a % 30 === 0 ? r - 7 : r - 4;
                    ctx.beginPath();
                    ctx.moveTo(cx + Math.cos(rad) * inner, cy - Math.sin(rad) * inner);
                    ctx.lineTo(cx + Math.cos(rad) * r, cy - Math.sin(rad) * r);
                    ctx.strokeStyle = a % 90 === 0 ? 'rgba(240,178,79,0.5)' : 'rgba(255,255,255,0.12)';
                    ctx.lineWidth = a % 90 === 0 ? 1.5 : 1; ctx.stroke();
                }
                ctx.fillStyle = '#889'; ctx.font = 'bold 8px sans-serif'; ctx.textAlign = 'center';
                ctx.fillText('N', cx, 10); ctx.fillText('S', cx, 76);
                ctx.fillText('E', 76, cy + 3); ctx.fillText('W', 4, cy + 3);
                const rad = deg * Math.PI / 180;
                const nx = cx + Math.cos(rad) * (r - 8);
                const ny = cy - Math.sin(rad) * (r - 8);
                ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(nx, ny);
                ctx.strokeStyle = '#f0b24f'; ctx.lineWidth = 2; ctx.stroke();
                ctx.beginPath(); ctx.arc(cx, cy, 3, 0, Math.PI * 2); ctx.fillStyle = '#f0b24f'; ctx.fill();
                const a1 = rad + 0.05; const a2 = rad - 0.05;
                ctx.beginPath(); ctx.moveTo(nx, ny);
                ctx.lineTo(cx + Math.cos(a1) * (r - 14), cy - Math.sin(a1) * (r - 14));
                ctx.lineTo(cx + Math.cos(a2) * (r - 14), cy - Math.sin(a2) * (r - 14));
                ctx.closePath(); ctx.fillStyle = '#f0b24f'; ctx.fill();
            }

                }, 200);
            }

            function simClear() { simData=[]; simIndex=0; simRunning=false; simPaused=false; simList.textContent='Нет данных'; simStatus.textContent=''; simBtn.textContent='▶ Старт'; simBtn.style.background='rgba(78,203,113,0.2)'; simBtn.style.borderColor='#4ecb71'; simBtn.style.color='#4ecb71'; simHistoryLines.forEach(function(l){scene.remove(l)}); simHistoryLines=[]; }

            simBtn.addEventListener('click', simPlayPauseStop);
            document.getElementById('btnSimClear').addEventListener('click', simClear);
            loadSimData();

            const clickRaycaster = new THREE.Raycaster();
            clickRaycaster.far = 500000;
            function groundPointFromEvent(e) {
                const rect = canvas.getBoundingClientRect();
                const px = Number.isFinite(e.offsetX) ? e.offsetX : (e.clientX - rect.left);
                const py = Number.isFinite(e.offsetY) ? e.offsetY : (e.clientY - rect.top);
                const width = canvas.clientWidth || rect.width || 1;
                const height = canvas.clientHeight || rect.height || 1;
                const mouse = new THREE.Vector2(
                    (px / width) * 2 - 1,
                    -(py / height) * 2 + 1
                );
                camera.updateMatrixWorld(true);
                camera.updateProjectionMatrix();
                clickRaycaster.setFromCamera(mouse, camera);
                if (terrainMesh) {
                    const hits = clickRaycaster.intersectObject(terrainMesh, true);
                    if (hits.length > 0) return hits[0].point;
                }
                const planeY = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
                const point = new THREE.Vector3();
                return clickRaycaster.ray.intersectPlane(planeY, point) ? point : null;
            }

            function placeGun(e) {
                const point = groundPointFromEvent(e);
                if (point) {
                    gunOffset.x = point.x;
                    gunOffset.z = point.z;
                    syncGunToTerrain();
                    if (targetWorld) updateTargetRange(targetWorld.x, targetWorld.z);
                    else rebuildPreview();
                }
            }

            function placeTargetClick(e) {
                var point = groundPointFromEvent(e);
                if (point) placeTargetModel(point.x, point.z);
            }

            // Clear targets on terrain reset
            var origResetFn = resetShot;
            resetShot = function() {
                targetModels.forEach(function(m) { scene.remove(m); });
                targetModels = [];
                targetWorld = null;
                origResetFn();
            };

            // ── 3D Axis indicator ────────────────────────────────────────
            var axisScene = new THREE.Scene();
            var axisCamera = new THREE.PerspectiveCamera(50, 1, 0.1, 200);
            axisCamera.position.set(5, 3, 5);
            axisCamera.lookAt(0, 0, 0);
            var axisGroup = new THREE.Group();
            var axisLen = 80;
            var xLine = new THREE.Line(
                new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(axisLen,0,0)]),
                new THREE.LineBasicMaterial({color:0xf25f5c, linewidth:2})
            );
            var yLine = new THREE.Line(
                new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,axisLen,0)]),
                new THREE.LineBasicMaterial({color:0x4ecb71, linewidth:2})
            );
            var zLine = new THREE.Line(
                new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,axisLen)]),
                new THREE.LineBasicMaterial({color:0x5bc8f0, linewidth:2})
            );
            axisGroup.add(xLine, yLine, zLine);
            // Labels using sprites
            function makeAxisLabel(text, color) {
                var c = document.createElement('canvas'); c.width=64; c.height=32;
                var ctx = c.getContext('2d'); ctx.fillStyle=color; ctx.font='bold 24px monospace'; ctx.fillText(text,4,26);
                var tex = new THREE.CanvasTexture(c); var sprite = new THREE.Sprite(new THREE.SpriteMaterial({map:tex}));
                sprite.scale.set(25,12,1); return sprite;
            }
            var xLabel = makeAxisLabel('X', '#f25f5c'); xLabel.position.set(axisLen+15,0,0);
            var yLabel = makeAxisLabel('Y', '#4ecb71'); yLabel.position.set(0,axisLen+15,0);
            var zLabel = makeAxisLabel('Z', '#5bc8f0'); zLabel.position.set(0,0,axisLen+15);
            axisGroup.add(xLabel, yLabel, zLabel);
            axisScene.add(axisGroup);

            // Sync axis orientation with main camera
            function updateAxisIndicator() {
                if (!camera) return;
                var q = camera.quaternion.clone();
                axisGroup.quaternion.copy(q);
            }

            function animate() {
                requestAnimationFrame(animate);
                controls.update();
                syncOrbitFromCamera();
                if (shotRunning) updateShot(1/60);
                updateAxisIndicator();
                var w = canvas.clientWidth || renderer.domElement.clientWidth || 1;
                var h = canvas.clientHeight || renderer.domElement.clientHeight || 1;
                renderer.setViewport(0, 0, w, h);
                renderer.setScissorTest(false);
                renderer.render(scene, camera);
                // Render axis on top
                renderer.autoClear = false;
                renderer.clearDepth();
                var vw = 150, vh = 150;
                renderer.setViewport(w - vw - 10, 10, vw, vh);
                renderer.setScissor(w - vw - 10, 10, vw, vh);
                renderer.setScissorTest(true);
                renderer.render(axisScene, axisCamera);
                renderer.setScissorTest(false);
                renderer.setViewport(0, 0, w, h);
                renderer.autoClear = true;
            }
            animate();
            loadOBJTerrain('Terrain_2.obj');
        })();
    </script>
    <footer style="position:fixed;bottom:0;left:0;right:0;z-index:5;height:50px;background:rgba(11,14,16,0.9);border-top:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;font-size:10px;color:#556"></footer>
</body>
</html>
